name: Sync data.json from OneDrive

on:
  repository_dispatch:
    types: [update-data]
  schedule:
    - cron: '10 2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write data.json
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo '${{ github.event.client_payload.data }}' | base64 -d > data.json
          else
            curl -L "${{ secrets.ONEDRIVE_URL }}" -o data.json
          fi

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto update $(date +'%Y-%m-%d')"
          git push
