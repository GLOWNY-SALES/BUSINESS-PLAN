<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GLOWNY SALES DASHBOARD 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{font-size:13px;}
body{font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:#EEECE7;color:#1a1a1a;min-height:100vh;}

/* ── Header ── */
.hd{background:#111;color:#fff;padding:12px 22px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:50;}
.hd-l{display:flex;flex-direction:column;gap:1px;}
.hd-brand{font-size:9px;color:#666;letter-spacing:.14em;text-transform:uppercase;}
.hd-title{font-size:14px;font-weight:700;}
.hd-r{display:flex;align-items:center;gap:7px;}
.btn{padding:5px 13px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;font-family:inherit;white-space:nowrap;}
.btn-vat{background:#fff;color:#111;position:relative;padding:5px 12px;}
.btn-vat.excl{background:#374151;color:#fff;}
.btn-vat .vtag{font-size:9px;font-weight:700;display:inline-block;padding:1px 5px;border-radius:3px;margin-left:4px;}
.btn-vat .vtag.on{background:#10B981;color:#fff;}
.btn-vat .vtag.off{background:#6B7280;color:#fff;}
.btn-ghost{background:transparent;border:1px solid #3a3a3a;color:#aaa;}
.btn-ghost:hover{border-color:#666;color:#fff;}
.btn-blue{background:#2563EB;color:#fff;}
.btn-blue:hover{background:#1D4ED8;}

/* ── Nav ── */
.nav{background:#fff;border-bottom:1px solid #E2E0DB;padding:0 22px;display:flex;align-items:center;gap:0;justify-content:space-between;flex-wrap:wrap;position:sticky;top:55px;z-index:49;}
.tab-g{display:flex;}
.tab,.vtab{padding:12px 15px;font-size:12px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:#888;white-space:nowrap;transition:color .12s;}
.tab:hover,.vtab:hover{color:#333;}
.tab.on{color:#111;border-bottom-color:#111;font-weight:700;}
.vtab.on{color:#2563EB;border-bottom-color:#2563EB;font-weight:700;}
.nav-sep{width:1px;background:#E2E0DB;margin:8px 0;align-self:stretch;}

/* ── Main ── */
.main{max-width:1200px;margin:0 auto;padding:20px 18px 60px;}

/* ── KPI cards ── */
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:16px;}
.kpi{background:#fff;border-radius:9px;padding:13px 15px;border:1px solid #E2E0DB;}
.kpi-lbl{font-size:9px;color:#999;font-weight:700;letter-spacing:.05em;margin-bottom:4px;text-transform:uppercase;}
.kpi-val{font-size:20px;font-weight:700;line-height:1.2;letter-spacing:-.02em;}
.kpi-sub{font-size:10px;color:#bbb;margin-top:2px;}
.kpi-dy{font-size:10px;font-weight:700;margin-top:2px;}
.kpi-dy.up{color:#059669;}.kpi-dy.dn{color:#DC2626;}

/* 상품분석 KPI: 데스크탑 4컬럼, 좁아지면 자동 축소 */
#itemKpis{grid-template-columns:repeat(4,1fr);}
.kpi-row{display:flex;justify-content:space-between;align-items:flex-end;gap:8px;margin-top:2px;}
.kpi-row > div:last-child{text-align:right;}
@media(max-width:860px){
  #itemKpis{grid-template-columns:repeat(2,1fr) !important;}
  .kpi-row{flex-direction:column;align-items:flex-start;gap:2px;}
  .kpi-row > div:last-child{text-align:left;}
}

/* ── Chart card ── */
.card{background:#fff;border-radius:9px;border:1px solid #E2E0DB;margin-bottom:14px;}
.card-hd{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #F0EFEB;gap:10px;flex-wrap:wrap;}
.card-ttl{font-size:12px;font-weight:700;}
.legend{display:flex;gap:12px;font-size:10px;color:#666;align-items:center;flex-wrap:wrap;}
.ldot{width:9px;height:9px;border-radius:2px;display:inline-block;flex-shrink:0;}
.lline{width:16px;height:2px;display:inline-block;vertical-align:middle;flex-shrink:0;}
.chart-wrap{padding:14px 16px;height:210px;position:relative;}

/* ── Tables ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
table{width:100%;border-collapse:collapse;font-size:11px;}
thead th{background:#F5F4F0;color:#888;font-weight:700;padding:7px 10px;text-align:right;border-bottom:1.5px solid #E2E0DB;font-size:10px;white-space:nowrap;position:sticky;top:0;z-index:2;}
thead th:first-child{text-align:left;}
thead th.sticky-l{position:sticky;left:0;z-index:3;background:#F5F4F0;}
tbody td{padding:6px 10px;text-align:right;border-bottom:1px solid #F0EEE9;vertical-align:top;}
tbody td:first-child{text-align:left;}
tbody td.sticky-l{position:sticky;left:0;background:#fff;z-index:2;}
tr.grp-hd td{background:#F8F7F3!important;font-weight:700;font-size:11px;color:#444;padding:7px 10px;border-top:1.5px solid #DDD;border-bottom:1px solid #E8E8E2;}
tr.grp-hd td.sticky-l{background:#F8F7F3!important;}
tr.sub-ttl td{background:#F0EDE7!important;font-weight:700;border-top:1.5px solid #D5D2CB;border-bottom:1.5px solid #D5D2CB;font-size:11px;}
tr.sub-ttl td.sticky-l{background:#F0EDE7!important;}
tr.grand-ttl td{background:#E8E4DC!important;font-weight:700;font-size:12px;border-top:2px solid #C8C4BC;}
tr.grand-ttl td.sticky-l{background:#E8E4DC!important;}
tr:not(.grp-hd):not(.sub-ttl):not(.grand-ttl):hover td{background:#F5F4EF;}
tr.act td{background:#FAFAF8;}
tr.sim td.cell-sim{background:#EFF6FF;}
tr.sim td:first-child{font-weight:600;}
tr:not(.grp-hd):not(.sub-ttl):not(.grand-ttl).act:hover td{background:#F2F2EE;}
.bdg{display:inline-flex;align-items:center;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;vertical-align:middle;margin-left:3px;}
.bdg-a{background:#EFEFEB;color:#666;}
.bdg-s{background:#DBEAFE;color:#1D4ED8;}
.bdg-p{background:#D1FAE5;color:#065F46;}  /* 진행중 */
.bdg-o{background:#D1FAE5;color:#065F46;}  /* over */
.bdg-u{background:#FEE2E2;color:#991B1B;}  /* under */
.bdg-m{background:#FEF3C7;color:#92400E;}  /* mid */

/* ── Group filter ── */
.grp-filter{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.gf-btn{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #E2E0DB;background:#fff;color:#888;font-family:inherit;transition:all .12s;white-space:nowrap;}
.gf-btn:hover{border-color:#999;color:#333;}
.gf-btn.on{color:#fff;border-color:transparent;}
.gf-btn[data-g="all"].on{background:#111;}
.gf-btn[data-g="online"].on{background:#2563EB;}
.gf-btn[data-g="offline"].on{background:#7C3AED;}
.gf-btn[data-g="ws"].on{background:#059669;}
.ch-name{font-size:11px;font-weight:500;color:#222;}
.ch-sub{font-size:10px;color:#aaa;display:block;margin-top:1px;}
.cell-act{vertical-align:top;}
.cell-act-v{font-size:12px;font-weight:700;color:#111;}
.cell-act-meta{font-size:9px;color:#aaa;margin-top:2px;white-space:nowrap;}
.cell-act-rate{}
.cell-sim-in{width:90px;padding:3px 5px;font-size:11px;font-weight:700;text-align:right;border:1px solid #BFDBFE;border-radius:4px;background:#EFF6FF;color:#1E40AF;font-family:inherit;}
.cell-sim-in:focus{outline:none;border-color:#2563EB;background:#fff;}
.cell-goal{font-size:9px;color:#aaa;margin-top:2px;white-space:nowrap;}

/* ── P&L specific ── */
.ei{width:95px;padding:3px 5px;font-size:11px;font-weight:700;text-align:right;border:1px solid #BFDBFE;border-radius:4px;background:#EFF6FF;color:#1E40AF;font-family:inherit;}
.ei:focus{outline:none;border-color:#2563EB;background:#fff;}

/* ── Assumption panel ── */
.ap{background:#fff;border-radius:9px;border:1px solid #E2E0DB;margin-bottom:14px;overflow:hidden;}
.ap-hd{padding:12px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none;}
.ap-hd:hover{background:#FAFAF8;}
.ap-ttl{font-size:11px;font-weight:700;}
.ap-body{padding:14px 16px;border-top:1px solid #EFEFEB;display:none;}
.ap-body.open{display:block;}
.ap-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;}
.ap-sname{font-size:11px;font-weight:700;margin-bottom:8px;padding-bottom:5px;border-bottom:1.5px solid #E2E0DB;}
.ap-sname.hn{color:#2563EB;border-color:#2563EB;}
.ap-sname.ds{color:#7C3AED;border-color:#7C3AED;}
.ap-sname.sg{color:#0891B2;border-color:#0891B2;}
.ap-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:10px;}
.ap-lbl{color:#777;}
.ap-in{width:100px;padding:3px 5px;font-size:10px;text-align:right;border:1px solid #D4D2CD;border-radius:4px;background:#FAFAF8;color:#111;font-family:inherit;}
.ap-in:focus{outline:none;border-color:#666;background:#fff;}

/* ── Colors ── */
.pos{color:#059669;font-weight:700;}.neg{color:#DC2626;font-weight:700;}.muted{color:#9CA3AF;}

/* ── Footer note ── */
.fn{font-size:10px;color:#aaa;line-height:1.9;padding:8px 2px;}
.fn strong{color:#777;}

/* ── VAT notice bar ── */
.vat-bar{padding:6px 14px;font-size:10px;font-weight:600;border-radius:6px;margin-bottom:10px;display:inline-flex;align-items:center;gap:6px;}
.vat-bar.incl{background:#D1FAE5;color:#065F46;}
.vat-bar.excl{background:#F3F4F6;color:#6B7280;}

@media(max-width:860px){
  .kpis{grid-template-columns:repeat(3,1fr);}
  .ap-grid{grid-template-columns:1fr 1fr;}
  .nav{padding:0 12px;}
  .tab,.vtab{padding:11px 10px;font-size:11px;}
}
@media(max-width:560px){
  .kpis{grid-template-columns:repeat(2,1fr);}
  .ap-grid{grid-template-columns:1fr;}
}

/* ── Item Analysis ── */
.it-toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid #F0EFEB;background:#FAFAF8;}
.it-tlbl{font-size:10px;color:#888;font-weight:700;}
.dim-btn{padding:5px 12px;border-radius:18px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #E2E0DB;background:#fff;color:#666;font-family:inherit;transition:all .12s;}
.dim-btn:hover{border-color:#999;color:#333;}
.dim-btn.on{color:#fff;border-color:transparent;}
.dim-btn[data-d="col"].on{background:#2563EB;}
.dim-btn[data-d="yr"].on{background:#7C3AED;}
.dim-btn[data-d="sn"].on{background:#D97706;}
.dim-btn[data-d="cat"].on{background:#059669;}
.it-dual{display:grid;grid-template-columns:1fr 1.4fr;gap:12px;margin-bottom:14px;}
.it-dual .card{margin-bottom:0;}
.it-wk-sel{padding:5px 10px;border-radius:6px;border:1.5px solid #fff;font-size:11px;font-weight:700;font-family:inherit;background:rgba(255,255,255,0.15);cursor:pointer;color:#fff;}
.it-wk-sel option{color:#111;background:#fff;}
.it-filter-grp{display:flex;flex-wrap:wrap;gap:5px;align-items:center;}
.it-fchip{padding:3px 8px;border-radius:14px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #E2E0DB;background:#fff;color:#888;font-family:inherit;}
.it-fchip:hover{border-color:#999;color:#333;}
.it-fchip.on{background:#111;color:#fff;border-color:#111;}
/* 필터 드롭다운 (다중선택) */
.it-dd-wrap{position:relative;display:inline-block;}
.it-dd-btn{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:6px;border:1px solid #E2E0DB;background:#fff;color:#555;font-family:inherit;font-size:11px;font-weight:600;cursor:pointer;min-width:80px;justify-content:space-between;}
.it-dd-btn:hover{border-color:#999;color:#111;}
.it-dd-btn.active{background:#111;color:#fff;border-color:#111;}
.it-dd-btn.open{border-color:#111;}
.it-dd-arr{font-size:9px;opacity:0.6;}
.it-dd-pop{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1px solid #D5D3CE;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,0.12);padding:6px;min-width:140px;max-height:280px;overflow-y:auto;z-index:100;}
.it-dd-pop.open{display:block;}
.it-dd-opt{display:flex;align-items:center;gap:6px;padding:5px 8px;font-size:11px;color:#333;cursor:pointer;border-radius:4px;font-weight:500;}
.it-dd-opt:hover{background:#F5F4F0;}
.it-dd-opt.on{color:#111;font-weight:700;}
.it-dd-opt input[type="checkbox"]{cursor:pointer;accent-color:#111;margin:0;}
.it-dd-actions{padding:4px 6px 6px;border-bottom:1px solid #F0EFEB;margin-bottom:4px;}
.it-dd-clear{font-size:10px;color:#DC2626;background:none;border:none;cursor:pointer;font-weight:700;padding:2px 4px;font-family:inherit;}
.it-dd-clear:hover{text-decoration:underline;}
.it-dd-empty{padding:8px;font-size:10px;color:#aaa;text-align:center;}
.it-sort-sel{padding:5px 10px;border-radius:6px;border:1.5px solid #E2E0DB;font-size:11px;font-family:inherit;background:#fff;cursor:pointer;font-weight:600;}
.it-pgbtns{display:flex;gap:3px;align-items:center;}
.it-pgbtn{padding:3px 9px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #E2E0DB;background:#fff;color:#666;font-family:inherit;}
.it-pgbtn.on{background:#111;color:#fff;border-color:#111;}
.it-table{font-size:11px;}
.it-table th{padding:7px 6px;text-align:right;font-size:9.5px;}
.it-table th:nth-child(2),.it-table th:nth-child(3){text-align:left;}
.it-table td{padding:5px 6px;text-align:right;font-size:11px;vertical-align:middle;}
.it-table td:nth-child(2),.it-table td:nth-child(3){text-align:left;}
.it-name{font-weight:600;font-size:11px;line-height:1.25;}
.it-name-sub{font-size:9px;color:#888;margin-top:1px;}
.it-cat-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.02em;}
.it-col-GC{background:#DBEAFE;color:#1D4ED8;}
.it-col-GY{background:#FCE7F3;color:#BE185D;}
.it-mup-bl{color:#2563EB;font-weight:700;}
.it-mup-hi{color:#059669;font-weight:700;}
.it-mup-md{color:#D97706;font-weight:600;}
.it-mup-lo{color:#DC2626;font-weight:600;}
.it-spark{width:60px;height:18px;}
.it-spark-bar{fill:#93C5FD;}
.it-spark-bar.last{fill:#2563EB;}
.it-chmix{display:inline-flex;gap:1px;width:65px;height:14px;border-radius:2px;overflow:hidden;}
.it-chmix-seg{height:100%;}
.it-stock-warn{color:#DC2626;font-weight:700;}
.it-stock-ok{color:#111;}
.it-opwk-warn{color:#DC2626;font-weight:700;}
.it-opwk-mid{color:#D97706;font-weight:600;}
.it-opwk-ok{color:#059669;font-weight:600;}
.it-opwk-dead{color:#9CA3AF;}
.it-reord-tag{display:inline-block;padding:1px 6px;border-radius:3px;font-size:9px;font-weight:700;}
.it-reord-yes{background:#FEE2E2;color:#991B1B;}
.it-reord-no{background:#E5E7EB;color:#9CA3AF;}
.it-bdg-stock{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;margin-left:4px;}
.it-bdg-low{background:#FEE2E2;color:#991B1B;}
.it-bdg-ok{background:#D1FAE5;color:#065F46;}
.it-bdg-high{background:#FED7AA;color:#9A3412;}
.it-pager{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#888;border-top:1px solid #F0EFEB;flex-wrap:wrap;gap:8px;}
.it-pg-nav{display:flex;align-items:center;gap:3px;}
.it-pg-arrow{width:26px;height:26px;border-radius:5px;border:1px solid #E2E0DB;background:#fff;color:#666;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;padding:0;}
.it-pg-arrow:hover:not(:disabled){background:#F5F4F0;border-color:#999;color:#111;}
.it-pg-arrow:disabled{opacity:.35;cursor:not-allowed;}
.it-pg-cur{min-width:60px;text-align:center;font-size:11px;font-weight:700;color:#333;padding:0 6px;}

/* 이번달 예측 배지 */
.cur-mo-forecast{font-size:11px;padding:5px 11px;border-radius:6px;background:#FEF3C7;color:#92400E;font-weight:600;line-height:1.3;border:1px solid transparent;}
.cur-mo-forecast.over{background:#D1FAE5;color:#065F46;border-color:#86EFAC;}
.cur-mo-forecast.under{background:#FEE2E2;color:#991B1B;border-color:#FECACA;}
.cur-mo-forecast strong{font-weight:700;}

/* 일매출 — 다중 헤더 sticky (채널헤더 + 누계 + 잔여 일평균) */
#dailyTblWrap thead tr.dly-hdr-ch   th{top:0;     z-index:3;}
#dailyTblWrap thead tr.dly-hdr-cum  th{top:34px;  z-index:3;}
#dailyTblWrap thead tr.dly-hdr-need th{top:80px;  z-index:3;}
#dailyTblWrap thead .sticky-l{z-index:4;}

/* 상품분석 — 헤더 sticky */
.it-tbl-wrap{max-height:680px;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.it-tbl-wrap thead th{position:sticky;top:0;z-index:5;background:#F5F4F0;}
.it-tbl-wrap thead tr.it-subttl td{position:sticky;top:28px;z-index:4;background:#FFF8E7;color:#92400E;font-weight:700;padding:6px 6px;text-align:right;font-size:11px;border-bottom:1.5px solid #E2E0DB;white-space:nowrap;}
.it-tbl-wrap thead tr.it-subttl td.it-subttl-lbl{text-align:left;font-size:10.5px;letter-spacing:-0.2px;}
.it-tbl-wrap thead tr.it-subttl td.muted{color:#bbb;font-weight:500;}

/* 모바일: 첫 2컬럼(# + 상품명) 좌측 sticky */
@media(max-width:860px){
  .it-tbl-wrap tbody td:nth-child(1),
  .it-tbl-wrap tbody td:nth-child(2){position:sticky;background:#fff;z-index:2;}
  .it-tbl-wrap tbody td:nth-child(1){left:0;}
  .it-tbl-wrap tbody td:nth-child(2){left:42px;box-shadow:2px 0 4px -2px rgba(0,0,0,0.10);}
  .it-tbl-wrap tbody tr:hover td:nth-child(1),
  .it-tbl-wrap tbody tr:hover td:nth-child(2){background:#FAFAF8;}
  /* thead 첫 2컬럼: top + left 동시 sticky → z-index 상향 */
  .it-tbl-wrap thead tr:first-child th:nth-child(1){left:0;z-index:7;}
  .it-tbl-wrap thead tr:first-child th:nth-child(2){left:42px;z-index:7;box-shadow:2px 0 4px -2px rgba(0,0,0,0.10);}
  /* subtotal 라벨(colspan=3) 첫 td도 좌측 sticky */
  .it-tbl-wrap thead tr.it-subttl td:first-child{left:0;z-index:6;box-shadow:2px 0 4px -2px rgba(0,0,0,0.10);}
}

/* 상품분석 — 검색창 */
.it-search-box{padding:5px 10px;border-radius:6px;border:1.5px solid #E2E0DB;font-size:11px;width:220px;font-family:inherit;background:#fff;}
.it-search-box:focus{outline:none;border-color:#2563EB;}
.it-search-clear{margin-left:-26px;width:20px;height:20px;border-radius:50%;border:none;background:#E2E0DB;color:#666;cursor:pointer;font-size:11px;line-height:1;padding:0;display:inline-flex;align-items:center;justify-content:center;font-family:inherit;}
.it-search-clear:hover{background:#DC2626;color:#fff;}
.it-search-wrap{display:inline-flex;align-items:center;}
@media(max-width:860px){
  .it-dual{grid-template-columns:1fr;}

const pi=s=>parseInt(String(s).replace(/[^0-9]/g,''))||0;
const fi=n=>Math.round(n).toLocaleString('ko-KR');

// Display value with VAT toggle
// source: 'ch'=+VAT, 'bep'=-VAT, 'profit'=always -VAT
function dv(n,src='ch'){
  if(n===null||n===undefined||!isFinite(n)) return null;
  if(src==='ch')   return ST.vat ? n : n/VAT_R;
  if(src==='bep')  return ST.vat ? n*VAT_R : n;
  return n; // profit: always as-is (-VAT)
}

function fm(n,src='ch'){
  const v=dv(n,src);
  if(v===null) return '—';
  const a=Math.abs(v),s=v<0?'-':'';
  if(a>=1e8) return s+(a/1e8).toFixed(1)+'억';
  if(a>=1e4) return s+Math.round(a/1e4).toLocaleString()+'만';
  return s+Math.round(a).toLocaleString();
}
function fw(n,src='ch'){
  const v=dv(n,src);
  if(v===null) return '—';
  const a=Math.abs(v),s=v<0?'△':'';
  if(a>=1e8) return s+(a/1e8).toFixed(1)+'억원';
  if(a>=1e4) return s+Math.round(a/1e4).toLocaleString()+'만원';
  return s+Math.round(a).toLocaleString()+'원';
}
function fp(n){if(n===null||!isFinite(n))return'—';return(n*100).toFixed(1)+'%';}
function fdelta(a,b){if(!a||!b)return null;const d=(a-b)/Math.abs(b);return{v:d,s:(d>=0?'+':'')+(d*100).toFixed(1)+'%'};}

function rateBdg(rate){
  if(rate===null) return '';
  const pct=(rate*100).toFixed(1);
  const cls=rate>=1?'bdg-o':rate>=0.8?'bdg-m':'bdg-u';
  return `<span class="bdg ${cls}">${pct}%</span>`;
}

// DT-aware goal/sim: ws_glb는 ST.dt=false일 때 목표·시뮬에서 제외
function chGoalEff(k,i,yr){
  if(k==='ws_glb'&&!ST.dt) return 0;
  return chGoal(k,i,yr);
}
function chSimEff(k,i){
  if(k==='ws_glb'&&!ST.dt) return 0;
  return chSim(k,i);
}
// 집계용: 확정 실적은 항상 포함, 진행중은 ST.chOv 또는 0, 시뮬은 DT 토글 반영
function chDispEff(k,i,yr){
  const act=chAct(k,i,yr);
  if(act!==null) return act; // 확정 실적
  if(yr==='2026'&&i===CURRENT_MONTH){
    // 진행중 월: ST.chOv에 있으면 그 값, 없으면 0
    if(k==='ws_glb'&&!ST.dt) return 0;
    return ST.chOv[k+'-'+i]??0;
  }
  if(k==='ws_glb'&&!ST.dt) return 0;
  return chSim(k,i);
}
// ── Channel revenue helpers
function chAct(k,i,yr){
  if(yr==='2025') return A25[k]?.[i]??null;
  if(i<=CURRENT_MONTH) return A26[k]?.[i]??null; // 확정 + 진행중 모두 actual 반환
  return null;
}
function chGoal(k,i,yr){
  if(yr==='2025') return null;
  return G26[k]?.[i]??0;
}
function chSim(k,i){ // override or goal default (+VAT)
  return ST.chOv[k+'-'+i]??G26[k]?.[i]??0;
}
function chDisp(k,i,yr){ // value to display for that cell (+VAT internal)
  if(yr==='2025') return A25[k]?.[i]??null;
  if(i<CLOSED_CH) return A26[k]?.[i]??null;
  return chSim(k,i);
}

// ── BEP/P&L helpers
function bRev(k,i,yr){
  if(yr==='2025') return BR25[k][i];
  if(BR26A[k][i]!==null) return BR26A[k][i];
  const ov=ST.ov[k+'-'+i];
  return ov!==undefined?ov:(BTGT26[k]?.[i]??null);
}
function bOI(k,i,yr){
  if(yr==='2025') return BOI25[k][i];
  if(BOI26A[k][i]!==null) return BOI26A[k][i];
  const r=bRev(k,i,yr);
  if(!r) return null;
  const c=ST.costs[k];
  const gp=r*(1-c.cogs/100);
  const rent=c.rentType==='pct'?r*(c.rent/100):c.rent;
  return Math.round(gp-c.labor-(r*c.card/100)-rent-c.depr-c.misc);
}
function bIsAct(k,i,yr){
  if(yr==='2025') return BR25[k][i]!==null;
  return BR26A[k][i]!==null;
}

function renderKPIs(){
  const yr=ST.yr==='cmp'?'2026':ST.yr;
  const vw=ST.view;
  let totCur=0,totGoal=0,totPY=0,mo=0;
  const chKeys=filteredChKeys();

  if(vw==='ch'){
    for(let i=0;i<12;i++){
      let mc=0,mg=0,mp=0;
      chKeys.forEach(k=>{
        const cv=chDispEff(k,i,yr);
        const gv=chGoalEff(k,i,yr);
        const pv=yr==='2026'?A25[k]?.[i]:null;
        if(cv){mc+=cv;mo++;}
        if(gv) mg+=gv;
        if(pv) mp+=pv;
      });
      totCur+=mc;totGoal+=mg;totPY+=mp;
    }
  } else {
    STORES.forEach(({k})=>{
      for(let i=0;i<12;i++){
        const r=bRev(k,i,yr);
        if(r){totCur+=dv(r,'bep');mo++;}
        const tg=BTGT26[k]?.[i];
        if(tg) totGoal+=dv(tg,'bep');
        const py=BR25[k][i];
        if(py) totPY+=dv(py,'bep');
      }
    });
  }
  // YTD: 마감 월 누계 + 진행 중 월 어제까지 일별 누계
  let ytdAct=0, ytdGoal=null;
  // 어제 날짜 (DAILY_DETAIL의 일자 인덱스 = 어제일자 - 1)
  const _ytdYesterday = new Date();
  _ytdYesterday.setDate(_ytdYesterday.getDate()-1);
  const _ytdYesterdayDay = _ytdYesterday.getDate();
  const _ytdCurMo = CURRENT_MONTH + 1; // 1-based 진행 중 월
  if(vw==='ch'){
    const ytdSrc=yr==='2025'?A25:A26;
    ytdAct=chKeys.reduce((s,k)=>{
      // 1) 마감된 월 누계
      for(let i=0;i<CLOSED_CH;i++) s+=(ytdSrc[k]?.[i]??0);
      // 2) 진행 중 월: DAILY_DETAIL에서 어제까지 일별 합산 (2026만)
      if(yr==='2026' && DAILY_DETAIL && DAILY_DETAIL['2026']){
        const moData = DAILY_DETAIL['2026'][String(_ytdCurMo)] || DAILY_DETAIL['2026'][_ytdCurMo];
        if(moData && Array.isArray(moData[k])){
          for(let d=0; d<_ytdYesterdayDay; d++){
            s += (moData[k][d] || 0);
          }
        }
      }
      return s;
    },0);
    ytdGoal=yr==='2026'?chKeys.reduce((s,k)=>{
      for(let i=0;i<CLOSED_CH;i++) s+=(chGoalEff(k,i,'2026')??0);
      // 진행 중 월 목표는 일별 비례로 부분 합산 (어제까지 / 월 일수)
      const monthGoal = chGoalEff(k, CURRENT_MONTH, '2026') ?? 0;
      const daysInMo = new Date(2026, _ytdCurMo, 0).getDate();
      s += monthGoal * (_ytdYesterdayDay / daysInMo);
      return s;
    },0):null;
  } else {
    // 매장 손익: 오프라인 매출 누계
    STORES.forEach(({k})=>{
      for(let i=0;i<CLOSED_PL;i++){
        const r=bRev(k,i,yr);
        if(r) ytdAct+=dv(r,'bep');
      }
    });
    ytdGoal=yr==='2026'?STORES.reduce((s,{k})=>{
      for(let i=0;i<CLOSED_PL;i++) s+=dv(BTGT26[k]?.[i]||0,'bep');
      return s;
    },0):null;
  }
  const ytdRate=ytdGoal&&ytdGoal>0?ytdAct/ytdGoal:null;
  // YTD 라벨: 어제 날짜까지 누계임을 명시
  const _ytdMo = _ytdYesterday.getMonth()+1;
  const _ytdD = _ytdYesterday.getDate();
  const ytdLbl = yr==='2025'
    ? '2025년 1~4월 누계'
    : (vw==='ch' ? `1/1~${_ytdMo}/${_ytdD} 누계` : '1~4월 누계');
  const dR=totPY>0?fdelta(totCur,totPY):null;
  const vatLbl=ST.vat?'(+VAT)':'(-VAT)';
  const dtNote=!ST.dt?'<span style="font-size:9px;background:#FEF3C7;color:#92400E;padding:1px 5px;border-radius:3px;margin-left:4px;">DT 제외</span>':'';
  const grpLblMap={all:'전체',online:'온라인',offline:'오프라인',ws:'도매'};
  const grpLbl=vw==='ch'&&ST.grp!=='all'?` · ${grpLblMap[ST.grp]}`:'';

  document.getElementById('kpis').innerHTML=`
    <div class="kpi">
      <div class="kpi-lbl">연간 목표 ${vatLbl}${dtNote}</div>
      <div class="kpi-val">${fm(totGoal)}</div>
      <div class="kpi-sub">${yr}년${grpLbl}${!ST.dt?' (DT 제외)':''}</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">YTD 실적 ${vatLbl} <span style="font-size:9px;color:#aaa;">(${ytdLbl})</span></div>
      <div class="kpi-val" style="color:#2563EB;">${fm(ytdAct,'ch')}</div>
      <div class="kpi-sub">${ytdRate!==null?'목표 대비 달성률':'전년 실적 기준'}</div>
      <div class="kpi-dy ${ytdRate!==null?(ytdRate>=1?'up':'dn'):'up'}">${ytdRate!==null?fp(ytdRate):'—'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">연간 시뮬 합계</div>
      <div class="kpi-val">${fm(totCur)}</div>
      <div class="kpi-sub">실적+시뮬${!ST.dt?' (DT 제외)':''}</div>
      ${dR?`<div class="kpi-dy ${dR.v>=0?'up':'dn'}">YoY ${dR.s}</div>`:''}
    </div>
    <div class="kpi">
      <div class="kpi-lbl">목표 달성률 (연간)</div>
      <div class="kpi-val ${totGoal>0&&totCur/totGoal>=1?'pos':''}">${totGoal>0?fp(totCur/totGoal):'—'}</div>
      <div class="kpi-sub">시뮬 포함 기준</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">YoY 성장률</div>
      <div class="kpi-val ${dR?(dR.v>=0?'pos':'neg'):'muted'}">${dR?dR.s:'—'}</div>
      <div class="kpi-sub">전년 동기 대비</div>
    </div>`;
}

    } else {
      visGroups.forEach(g=>{
        ds.push({type:'bar',label:g.label,stack:'s',order:2,
          data:MO.map((_,i)=>dv(g.keys.reduce((s,k)=>{const v=chDispEff(k,i,yr);return s+(v||0);},0),'ch')/1e6),

    ds.push({type:'line',label:`목표${!ST.dt?' (DT제외)':''}`,order:0,
      data:MO.map((_,i)=>dv(visKeys.reduce((s,k)=>s+(chGoalEff(k,i,yr)||0),0),'ch')/1e6),

      borderDash:[4,3],pointRadius:3,pointBackgroundColor:'#DC2626',tension:.3,spanGaps:true,fill:false});

    if(ST.grp!=='all'){
      const chDefs=CH_GROUPS.find(g=>g.id===ST.grp)?.chs||[];
      const chColors=['#1D4ED8','#4F46E5','#0891B2','#059669','#D97706','#DC2626'];
      document.getElementById('legend').innerHTML=
        chDefs.map(({n},ci)=>`<div style="display:flex;align-items:center;gap:4px;"><div class="ldot" style="background:${chColors[ci]}33;border:1px solid ${chColors[ci]};"></div><span>${n}</span></div>`).join('')+
        `<div style="display:flex;align-items:center;gap:4px;"><div class="lline" style="background:#DC2626;height:1px;border-top:2px dashed #DC2626;"></div><span style="color:#DC2626;">목표</span></div>`;
    } else {
      document.getElementById('legend').innerHTML=
        visGroups.map(g=>`<div style="display:flex;align-items:center;gap:4px;"><div class="ldot" style="background:${g.bg};border:1px solid ${g.c};"></div><span>${g.label}</span></div>`).join('')+
        `<div style="display:flex;align-items:center;gap:4px;"><div class="lline" style="background:#DC2626;height:1px;border-top:2px dashed #DC2626;"></div><span style="color:#DC2626;">목표${!ST.dt?' (DT제외)':''}</span></div>`;
    }
  } else {
    // P&L chart
    STORES.forEach(({k,n,c,bg},idx)=>{
      ds.push({type:'bar',label:n,stack:'s',order:2,
        data:MO.map((_,i)=>{const r=bRev(k,i,yr);return r?dv(r,'bep')/1e6:0;}),
        backgroundColor:bg,borderColor:c,borderWidth:1});
    });
    const oiData=MO.map((_,i)=>{
      let o=0;
      STORES.forEach(({k})=>{const ov=bOI(k,i,yr);if(ov)o+=ov;});
      return o/1e6;
    });
    ds.push({type:'line',label:'영업이익',data:oiData,order:0,
      borderColor:'#059669',backgroundColor:'rgba(5,150,105,.08)',
      borderWidth:2,pointRadius:3,tension:.35,spanGaps:true,fill:false});
    document.getElementById('legend').innerHTML=
      STORES.map(({n,c,bg})=>`<div style="display:flex;align-items:center;gap:4px;"><div class="ldot" style="background:${bg};border:1px solid ${c};"></div><span>${n}</span></div>`).join('')+
      `<div style="display:flex;align-items:center;gap:4px;"><div class="lline" style="background:#059669;"></div><span style="color:#059669;font-weight:700;">영업이익</span></div>`;
  }

  // 진행 중 월 박스 하이라이트 plugin
  const curMonthHighlight = {
    id: 'curMonthHighlight',
    beforeDatasetsDraw(chart) {
      if(yr !== '2026') return;
      const {ctx, chartArea, scales} = chart;
      if(!scales.x || !chartArea) return;
      const xScale = scales.x;
      const mIdx = CURRENT_MONTH;
      // 막대 너비 추정: 카테고리 너비
      const colWidth = (chartArea.right - chartArea.left) / 12;
      const xCenter = xScale.getPixelForValue(mIdx);
      const padding = colWidth * 0.06;
      const xLeft = xCenter - colWidth/2 + padding;
      const xRight = xCenter + colWidth/2 - padding;
      ctx.save();
      ctx.fillStyle = 'rgba(217, 119, 6, 0.10)';
      ctx.fillRect(xLeft, chartArea.top, xRight - xLeft, chartArea.bottom - chartArea.top);
      ctx.strokeStyle = '#D97706';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(xLeft, chartArea.top, xRight - xLeft, chartArea.bottom - chartArea.top);
      ctx.setLineDash([]);
      // 상단 "진행중" 라벨
      ctx.fillStyle = '#D97706';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('● 진행중', xCenter, chartArea.top - 4);
      ctx.restore();
    }
  };

  const ctx=document.getElementById('chart').getContext('2d');
  if(chartInst){chartInst.destroy();chartInst=null;}
  chartInst=new Chart(ctx,{
    data:{labels:MO,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,
      layout:{padding:{top:16}}, // 진행중 라벨 공간 확보
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:c=>`${c.dataset.label}: ${c.parsed.y!==null?(c.parsed.y.toFixed(0)+'백만'):'—'}`
      }}},
      scales:{
        x:{grid:{display:false},ticks:{font:{size:10}}},
        y:{grid:{color:'#F0EFEB'},ticks:{font:{size:10},callback:v=>v>=1000?(v/1000).toFixed(0)+'억':v+'M'}},
      },
    },
    plugins:[curMonthHighlight],
  });

  // 이번달 예측 배지 갱신
  renderCurMonthForecast();
}

// ── 이번달 예측 계산 + 배지 표시
function renderCurMonthForecast(){
  const el = document.getElementById('curMoForecast');
  if(!el) return;
  const yr = ST.yr;
  const vw = ST.view;
  // 2026 채널 뷰에서만 표시
  if(yr !== '2026' || vw !== 'ch'){
    el.style.display = 'none';
    return;
  }
  // DAILY_DETAIL 없으면 숨김
  const moData = DAILY_DETAIL?.['2026']?.[String(CURRENT_MONTH+1)] || DAILY_DETAIL?.['2026']?.[CURRENT_MONTH+1];
  if(!moData){
    el.style.display = 'none';
    return;
  }
  const yesterday = new Date();
  yesterday.setDate(yesterday.getDate()-1);
  const yesterdayDay = yesterday.getDate();
  const daysInMo = new Date(2026, CURRENT_MONTH+1, 0).getDate();
  if(yesterdayDay <= 0){
    el.style.display = 'none';
    return;
  }
  const chKeys = filteredChKeys();
  let actMTD = 0;
  let goalMo = 0;
  chKeys.forEach(k=>{
    const arr = moData[k] || [];
    for(let d=0; d<yesterdayDay; d++) actMTD += (arr[d] || 0);
    goalMo += (chGoalEff(k, CURRENT_MONTH, '2026') ?? 0);
  });
  if(goalMo <= 0){
    el.style.display = 'none';
    return;
  }
  const dailyAvg = actMTD / yesterdayDay;
  const expected = dailyAvg * daysInMo;
  const rate = expected / goalMo;

  let cls = '', status = '';
  if(rate >= 1.0) { cls = 'over'; status = '✅ 달성 예상'; }
  else if(rate >= 0.9) { cls = ''; status = '⚠️ 근접'; }
  else { cls = 'under'; status = '❌ 미달 예상'; }

  el.className = `cur-mo-forecast ${cls}`;
  el.style.display = 'inline-block';
  const monName = `${CURRENT_MONTH+1}월`;
  el.innerHTML = `📍 ${monName} 예측: <strong>${fm(expected,'ch')}</strong> / 목표 <strong>${fm(goalMo,'ch')}</strong> · 달성률 <strong>${(rate*100).toFixed(0)}%</strong> ${status} <span style="font-weight:400;font-size:10px;color:#999;">(${yesterdayDay}/${daysInMo}일 진행, 일평균 ${fm(dailyAvg,'ch')})</span>`;
}

// ══════════════════════════════════════════════
//  CHANNEL TABLE
// ══════════════════════════════════════════════
function renderChTable(){
  const yr=ST.yr;
  const isCmp=yr==='cmp';
  const yr2=isCmp?'2026':yr;

  // 그룹 필터 적용
  const visGroups=ST.grp==='all'?CH_GROUPS:CH_GROUPS.filter(g=>g.id===ST.grp);
  const visKeys=filteredChKeys();
  const grpLblMap={all:'전체',online:'온라인',offline:'오프라인',ws:'도매'};

  // Build header
  let th=`<thead><tr>
    <th class="sticky-l" style="text-align:left;min-width:120px;z-index:4;">채널</th>
    <th style="min-width:70px;">연간 목표</th>
    <th style="min-width:60px;">YTD실적</th>
    <th style="min-width:55px;">달성률</th>`;
  MO.forEach((m,i)=>{
    let badge='';
    if(yr2==='2026'){
      if(i===CURRENT_MONTH) badge=`<span class="bdg bdg-p" style="margin-left:3px;">진행중</span><div style="font-size:9px;color:#059669;font-weight:600;margin-top:2px;">${YESTERDAY_STR} 기준</div>`;
    }
    th+=`<th style="min-width:${i===CURRENT_MONTH&&yr2==='2026'?'100px':(i<CLOSED_CH&&yr2==='2026'?'88px':'82px')}">${m}${badge}</th>`;
  });
  th+=`</tr></thead>`;

  let tb='<tbody>';
  let groupsHtml='';
  let grandGoal=0,grandAct=0,grandYTD=0;

  visGroups.forEach(grp=>{
    // 소계 집계는 DT-aware 버전으로
    let grpGoal=0,grpYTD=0;
    const grpMoEff=Array(12).fill(0);   // DT 반영한 월별 합
    const grpGoalMoEff=Array(12).fill(0);

    // Group header
    groupsHtml+=`<tr class="grp-hd"><td class="sticky-l" colspan="4">${grp.n}</td>${MO.map(()=>'<td></td>').join('')}</tr>`;

    grp.chs.forEach(ch=>{
      const isDT=ch.k==='ws_glb';
      const dtExcl=isDT&&!ST.dt; // 이 행이 집계 제외 상태인지

      const annGoal=dtExcl?0:(G26[ch.k]?.reduce((s,v)=>s+v,0)||0);
      const ytdAct=yr2==='2026'?Array.from({length:CLOSED_CH},(_,i)=>A26[ch.k]?.[i]||0).reduce((s,v)=>s+v,0):0;
      const ytdGoalCh=yr2==='2026'?Array.from({length:CLOSED_CH},(_,i)=>chGoalEff(ch.k,i,'2026')||0).reduce((s,v)=>s+v,0):0;
      const rate=ytdGoalCh>0?ytdAct/ytdGoalCh:null;

      if(!dtExcl){grpGoal+=dtExcl?0:annGoal;grpYTD+=ytdAct;}

      let annActEff=0;
      for(let i=0;i<12;i++){
        const v=chDispEff(ch.k,i,yr2);
        if(v&&!dtExcl){annActEff+=v;grpMoEff[i]+=(v||0);}
        else if(v&&dtExcl){/* ws_glb 제외 모드: 실적도 소계에서 제외 */}
        if(!dtExcl) grpGoalMoEff[i]+=(chGoalEff(ch.k,i,yr2)||0);
        // 행 표시용(DT 제외여도 행 자체는 표시)
        grpMoEff[i]; // no-op, just for clarity
      }
      if(!dtExcl) grandAct+=annActEff;

      // 행 배경: ws_glb 제외 상태면 흐리게
      const rowStyle=dtExcl?'opacity:0.45;':'';
      const dtBadge=isDT?`<span class="bdg" style="background:${ST.dt?'#D1FAE5':'#FEF3C7'};color:${ST.dt?'#065F46':'#92400E'};margin-left:4px;">${ST.dt?'합산포함':'합산제외'}</span>`:'';
      const actRow=yr2==='2026'?'sim':'act';

      groupsHtml+=`<tr class="${actRow}" style="${rowStyle}">
        <td class="sticky-l cell-act">
          <span class="ch-name">${ch.n}${dtBadge}</span>
          <span class="ch-sub">${ch.sub}</span>
        </td>
        <td>${yr2==='2026'?fm(G26[ch.k]?.reduce((s,v)=>s+v,0)||0,'ch'):'—'}</td>
        <td style="color:#2563EB;font-weight:700;">${yr2==='2026'?fm(ytdAct,'ch'):'—'}</td>
        <td>${yr2==='2026'?rateBdg(rate):'—'}</td>`;

      for(let i=0;i<12;i++){
        const act=chAct(ch.k,i,yr2);
        const goal=G26[ch.k]?.[i]||0;   // 행 자체는 원본 목표 표시
        const isActMonth=i<CLOSED_CH&&yr2==='2026';

        if(yr2==='2025'){
          const v=A25[ch.k]?.[i];
          groupsHtml+=`<td class="cell-act">${v?`<div class="cell-act-v">${fm(v,'ch')}</div>`:'<span class="muted">—</span>'}</td>`;
        } else if(isActMonth){
          // 확정 월
          const r=goal>0?act/goal:null;
          const actDisp=act!==null?fm(act,'ch'):'—';
          const goalDisp=goal?`<div class="cell-goal">목 ${fm(goal,'ch')} ${r!==null?rateBdg(r):''}</div>`:'';
          groupsHtml+=`<td class="cell-act"><div class="cell-act-v">${actDisp}</div>${goalDisp}</td>`;
        } else if(i===CURRENT_MONTH&&yr2==='2026'){
          // 진행중 월 — ST.chOv에 데이터 있으면 표시, 없으면 0
          const rawVal=ST.chOv[ch.k+'-'+i]??0;
          const curDisp=ST.vat?rawVal:Math.round(rawVal/VAT_R);
          const rate=goal>0&&rawVal>0?rawVal/goal:null;
          const rateTag=rate!==null?`<div style="margin-top:2px;">${rateBdg(rate)}</div>`:'';
          const goalDisp=goal?`<div class="cell-goal">목 ${fm(goal,'ch')}</div>`:'';
          if(ch.k==='misswu'){
            groupsHtml+=`<td style="background:#F0FDF4;"><span class="muted" style="font-size:10px;">—</span></td>`;
          } else {
            groupsHtml+=`<td style="background:#F0FDF4;"><input class="cell-sim-in" type="text" inputmode="numeric"
              data-k="${ch.k}-${i}" data-ck="${ch.k}" data-ci="${i}"
              style="border-color:#86EFAC;background:#ECFDF5;"
              title="진행중 — ${YESTERDAY_STR} 기준 | ${ST.vat?'+VAT 입력':'-VAT 입력'}"
              value="${fi(curDisp)}">${goalDisp}${rateTag}</td>`;
          }
        } else {
          const simVal=chSim(ch.k,i);   // 내부 저장값은 항상 +VAT
          const simDisp=ST.vat?simVal:Math.round(simVal/VAT_R); // 표시값은 토글 반영
          const goalDisp=goal?`<div class="cell-goal">목 ${fm(goal,'ch')}</div>`:'';
          if(ch.k==='misswu'||goal===0){
            groupsHtml+=`<td class="cell-sim"><span class="muted" style="font-size:10px;">—</span></td>`;
          } else {
            groupsHtml+=`<td class="cell-sim"><input class="cell-sim-in" type="text" inputmode="numeric"
              data-k="${ch.k}-${i}" data-ck="${ch.k}" data-ci="${i}"
              title="${ST.vat?'+VAT 입력':'-VAT 입력 (저장 시 ×1.1 자동 변환)'}"
              value="${fi(simDisp)}">${goalDisp}</td>`;
          }
        }
      }
      groupsHtml+='</tr>';
    });

    // Sub-total row (DT-aware)
    const stYTDGoal=Array.from({length:CLOSED_CH},(_,i)=>grp.chs.reduce((s,c)=>s+(chGoalEff(c.k,i,yr2)||0),0)).reduce((s,v)=>s+v,0);
    const stRate=grpYTD>0&&stYTDGoal>0?grpYTD/stYTDGoal:null;
    groupsHtml+=`<tr class="sub-ttl">
      <td class="sticky-l">소계 — ${grp.n}${grp.id==='ws'&&!ST.dt?' <span style="font-size:9px;color:#92400E;">(DT 제외)</span>':''}</td>
      <td>${fm(grpGoal,'ch')}</td>
      <td style="color:#2563EB;">${fm(grpYTD,'ch')}</td>
      <td>${rateBdg(stRate)}</td>`;
    for(let i=0;i<12;i++){
      // 소계는 DT-aware 집계
      const effVal=grp.chs.reduce((s,c)=>{
        if(c.k==='ws_glb'&&!ST.dt){
          // 확정 실적도 제외
          return s;
        }
        return s+(chDispEff(c.k,i,yr2)||0);
      },0);
      const effGoal=grpGoalMoEff[i];
      const isAct=i<CLOSED_CH&&yr2==='2026';
      if(isAct) groupsHtml+=`<td style="font-weight:700;">${fm(effVal,'ch')}${effGoal?`<div class="cell-goal">목 ${fm(effGoal,'ch')} ${rateBdg(effVal/effGoal)}</div>`:''}</td>`;
      else groupsHtml+=`<td style="font-weight:700;">${fm(effVal,'ch')}</td>`;
    }
    groupsHtml+='</tr>';
    grandGoal+=grpGoal;grandYTD+=grpYTD;
  });

  // Grand total (그룹 필터 + DT-aware)
  const grandYTDGoal=Array.from({length:CLOSED_CH},(_,i)=>visKeys.reduce((s,k)=>s+(chGoalEff(k,i,'2026')||0),0)).reduce((s,v)=>s+v,0);
  const grandRate=grandYTD>0&&grandYTDGoal>0?grandYTD/grandYTDGoal:null;
  const dtNote=!ST.dt?' <span style="font-size:10px;background:#FEF3C7;color:#92400E;padding:1px 6px;border-radius:3px;">DT 제외</span>':'';
  const grpTtl=ST.grp==='all'?'Grand Total':grpLblMap[ST.grp]+' 합계';
  tb+=`<tr class="grand-ttl">
    <td class="sticky-l" style="font-size:12px;">${grpTtl}${dtNote}</td>
    <td style="color:#111;">${fm(grandGoal,'ch')}</td>
    <td style="color:#2563EB;">${fm(grandYTD,'ch')}</td>
    <td>${rateBdg(grandRate)}</td>`;
  for(let i=0;i<12;i++){
    const v=visKeys.reduce((s,k)=>s+(chDispEff(k,i,yr2)||0),0);
    const g=visKeys.reduce((s,k)=>s+(chGoalEff(k,i,yr2)||0),0);
    const isAct=i<CLOSED_CH&&yr2==='2026';
    tb+=`<td style="font-weight:700;">${fm(v,'ch')}${isAct&&g?`<div class="cell-goal">목 ${fm(g,'ch')} ${rateBdg(v/g)}</div>`:''}</td>`;
  }
  tb+=`</tr><tr style="height:6px;background:transparent;"><td colspan="${4+12}" style="border:none;padding:0;"></td></tr>`+groupsHtml+'</tbody>';

  document.getElementById('tblWrap').innerHTML=`<table>${th}${tb}</table>`;
  attachChInputs();
}

function attachChInputs(){
  document.querySelectorAll('.cell-sim-in').forEach(el=>{
    el.addEventListener('focus',e=>{
      const raw=pi(e.target.value);
      e.target.value=raw>0?raw.toString():'';
      e.target.select();
    });
    el.addEventListener('blur',e=>{
      const raw=pi(e.target.value);
      // 저장은 항상 +VAT 기준 — -VAT 모드로 입력된 경우 ×1.1 변환
      ST.chOv[el.dataset.k]=ST.vat ? raw : Math.round(raw*VAT_R);
      save();renderKPIs();renderChart();
      renderChTable();
    });
    el.addEventListener('input',e=>{
      const pos=e.target.selectionStart;
      const before=e.target.value.slice(0,pos).replace(/[^0-9]/g,'').length;
      const raw=pi(e.target.value);
      if(raw>0){
        const f=fi(raw);e.target.value=f;
        let c=0,cnt=0;
        while(c<f.length&&cnt<before){if(/[0-9]/.test(f[c]))cnt++;c++;}
        try{e.target.setSelectionRange(c,c);}catch(x){}
      }
    });
  });
}

function renderPLTable(){
  const yr=ST.yr,isCmp=yr==='cmp';
  if(isCmp){renderCmpTable();return;}

  let th=`<thead><tr>
    <th class="sticky-l" style="text-align:left;">월</th>`;
  STORES.forEach(({n,c})=>th+=`<th style="color:${c};min-width:80px;">${n}${ST.vat?'<br><span style="color:#ccc;font-weight:400;font-size:9px;">+VAT</span>':''}<br><span style="font-size:9px;color:#aaa;font-weight:400;">매출 / OI / 율</span></th>`);
  th+=`<th>합계매출</th><th>목표</th><th>달성률</th><th>영업이익</th><th>이익률</th></tr></thead>`;

  let tb='<tbody>';
  let tR=0,tOI=0,tTg=0;

  for(let i=0;i<12;i++){
    let rowR=0,rowOI=0,rowTg=0,hasData=false;
    STORES.forEach(({k})=>{
      const r=bRev(k,i,yr),o=bOI(k,i,yr);
      if(r){rowR+=r;hasData=true;}
      if(o) rowOI+=o;
      rowTg+=(BTGT26[k]?.[i]||0);
    });
    if(!hasData&&yr==='2026'){
      // show sim
    } else if(!hasData){
      tb+=`<tr><td class="sticky-l">${MO[i]}</td><td colspan="9" class="muted" style="text-align:center;">—</td></tr>`;
      continue;
    }
    tR+=rowR;tOI+=rowOI;tTg+=rowTg;

        :`<span class="bdg bdg-s">시뮬</span>`;

        tb+=`<td style="font-size:11px;">${r?fm(r,'bep'):'—'}${oiStr}${mrStr}</td>`;
      }
    });
    tb+=`<td style="font-weight:700;">${fm(rowR,'bep')}</td>
      <td class="muted">${fm(rowTg,'bep')}</td>
      <td>${rateBdg(rate)}</td>
      <td style="color:${oc};font-weight:700;">${fm(rowOI,'profit')}</td>
      <td style="color:${oc};">${rowR>0?fp(rowOI/rowR):'—'}</td>
    </tr>`;
  }

  const tm=tR>0?tOI/tR:0;
  const toc=tOI>=0?'#059669':'#DC2626';
  tb+=`<tr class="sub-ttl">
    <td class="sticky-l">연간 합계</td>
    ${STORES.map(({k})=>`<td>${fm(STORES.reduce((s)=>s,0),'bep')}</td>`).join('')}
    <td style="font-weight:700;">${fm(tR,'bep')}</td>
    <td class="muted">${fm(tTg,'bep')}</td>
    <td>${rateBdg(tTg>0?tR/tTg:null)}</td>
    <td style="color:${toc};">${fm(tOI,'profit')}</td>
    <td style="color:${toc};">${fp(tm)}</td>
  </tr></tbody>`;

  document.getElementById('tblWrap').innerHTML=`<table>${th}${tb}</table>`;
  attachPLInputs();
}

function attachPLInputs(){
  document.querySelectorAll('.ei').forEach(el=>{
    el.addEventListener('focus',e=>{e.target.value=pi(e.target.value).toString();e.target.select();});
    el.addEventListener('blur',e=>{
      const raw=pi(e.target.value);
      // 저장은 항상 -VAT 기준 — +VAT 모드로 입력된 경우 ÷1.1 변환
      ST.ov[el.dataset.k]=ST.vat ? Math.round(raw/VAT_R) : raw;
      save();render();
    });
    el.addEventListener('input',e=>{
      const pos=e.target.selectionStart;
      const before=e.target.value.slice(0,pos).replace(/[^0-9]/g,'').length;
      const raw=pi(e.target.value);
      if(raw>0){const f=fi(raw);e.target.value=f;
        let c=0,cnt=0;while(c<f.length&&cnt<before){if(/[0-9]/.test(f[c]))cnt++;c++;}
        try{e.target.setSelectionRange(c,c);}catch(x){}
      }
    });
  });
}

function renderDailyKPIs(){
  const yr = ST_DAILY.yr;
  const mo = ST_DAILY.month;
  const chFilter = ST_DAILY.ch;
  const today = new Date();
  const isCurYrMo = yr===String(DAILY_CUR_YEAR)&&mo===DAILY_CUR_MONTH;
  const todayDay = isCurYrMo ? today.getDate()-1 : DIM[mo-1];
  const moData = (DAILY_DETAIL[yr]||{})[String(mo)] || (DAILY_DETAIL[yr]||{})[mo] || {};

  const visChs = DAILY_CHS.filter(c=> chFilter==='all'||c.g===(chFilter==='online'?'온라인':'오프라인'));

  // MTD 실적 합산
  let mtdAct=0;
  visChs.forEach(c=>{
    for(let d=0;d<todayDay;d++){
      const v=moData[c.k]?.[d];
      if(v&&v>0) mtdAct+=v;
    }
  });

  // 월 목표 (2026만)
  const moGoal=yr==='2026'?visChs.reduce((s,c)=>s+(G26[c.k]?.[mo-1]||0),0):0;

  // 전년 동월 (YoY)
  const prevYr=String(parseInt(yr)-1);
  const prevMoData=(DAILY_DETAIL[prevYr]||{})[String(mo)]||(DAILY_DETAIL[prevYr]||{})[mo]||{};
  let pyAct=0;
  visChs.forEach(c=>{
    for(let d=0;d<DIM[mo-1];d++){
      const v=prevMoData[c.k]?.[d];
      if(v&&v>0) pyAct+=v;
    }
  });
  // 전년 없으면 A25 기준
  if(pyAct===0&&yr==='2026') pyAct=visChs.reduce((s,c)=>s+(A25[c.k]?.[mo-1]||0),0);

  const yoy=pyAct>0?(mtdAct-pyAct)/pyAct:null;
  const rate=moGoal>0?mtdAct/moGoal:null;
  const isClosedMo=!isCurYrMo;
  const remDays=DIM[mo-1]-todayDay;
  const dailyNeed=remDays>0&&moGoal>mtdAct?Math.round((moGoal-mtdAct)/remDays):0;
  const chLbl=chFilter==='all'?'전채널':chFilter==='online'?'온라인':'오프라인';

  document.getElementById('dailyKpis').innerHTML=`
    <div class="kpi">
      <div class="kpi-lbl">${mo}월 목표 (+VAT)</div>
      <div class="kpi-val">${moGoal>0?fm(moGoal,'ch'):'—'}</div>
      <div class="kpi-sub">${chLbl} 합산</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">MTD 실적 (+VAT) <span style="font-size:9px;color:#aaa;">(~${mo}/${todayDay})</span></div>
      <div class="kpi-val" style="color:#2563EB;">${fm(mtdAct,'ch')}</div>
      <div class="kpi-sub">목표 대비 달성률</div>
      <div class="kpi-dy ${rate&&rate>=1?'up':'dn'}">${rate?fp(rate):'—'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">${isClosedMo ? '월 목표 달성 현황' : '잔여 일평균 필요 매출'}</div>
      <div class="kpi-val" style="color:${isClosedMo?(rate&&rate>=1?'#059669':'#DC2626'):'#D97706'};">
        ${isClosedMo
          ? (rate&&rate>=1 ? '✅ 달성' : '❌ 미달성')
          : (dailyNeed>0?fm(dailyNeed,'ch'):'✅ 달성')}
      </div>
      <div class="kpi-sub">${isClosedMo
        ? (rate!==null ? `목표 대비 ${fp(rate)} (${rate>=1?'+':''}${fp(rate-1)})` : '—')
        : `${remDays}일 남음`}</div>
      ${isClosedMo&&rate!==null ? `<div class="kpi-dy ${rate>=1?'up':'dn'}">${rate>=1?'+':''}${fp(rate-1)}</div>` : ''}
    </div>
    <div class="kpi">
      <div class="kpi-lbl">YoY 성장률 <span style="font-size:9px;color:#aaa;">(전년 동월)</span></div>
      <div class="kpi-val ${yoy&&yoy>=0?'pos':'neg'}">${yoy!==null?(yoy>=0?'+':'')+fp(yoy):'—'}</div>
      <div class="kpi-sub">전년 동월 대비</div>
    </div>`;
}

const DAILY_CHS = [
  {k:'cafe24',    n:'자사몰(KR)',  g:'온라인'},
  {k:'mss',       n:'무신사',      g:'온라인'},

  {k:'cafe24en',  n:'자사몰(EN)',  g:'온라인'},
  {k:'mssglobal', n:'무신사 글로벌',g:'온라인'},
  {k:'hannam',    n:'한남점',      g:'오프라인'},
  {k:'dosan',     n:'도산점',      g:'오프라인'},
  {k:'ssg',       n:'신세계강남',  g:'오프라인'},
];
const DIM=[31,28,31,30,31,30,31,31,30,31,30,31];

function renderDailyTable(){
  const yr = ST_DAILY.yr;
  const mo = ST_DAILY.month;
  const chFilter = ST_DAILY.ch;
  const today = new Date();
  const isCurYrMo = yr===String(DAILY_CUR_YEAR)&&mo===DAILY_CUR_MONTH;
  const todayDay = isCurYrMo ? today.getDate()-1 : DIM[mo-1];
  const totalDays = DIM[mo-1];
  const remDays = totalDays - todayDay;
  const moData = (DAILY_DETAIL[yr]||{})[String(mo)] || (DAILY_DETAIL[yr]||{})[mo] || {};

  // 연도 셀렉터 sync
  const yrSel=document.getElementById('dailyYrSel');
  if(yrSel) yrSel.value=yr;

  // 월 드롭다운 — 2026은 12월까지, 2025는 12월까지
  const maxMo = 12;
  document.getElementById('dailyMonthFilter').innerHTML=`
    <select onchange="ST_DAILY.month=parseInt(this.value);renderDailyKPIs();renderDailyTable();"
      style="padding:4px 10px;border-radius:6px;border:1.5px solid #E2E0DB;font-size:12px;font-family:inherit;background:#fff;cursor:pointer;">
      ${Array.from({length:maxMo},(_,i)=>i+1).map(m=>`<option value="${m}"${mo===m?' selected':''}>${m}월</option>`).join('')}
    </select>`;

  // 채널 필터 버튼
  document.getElementById('dailyChFilter').innerHTML = `
    <button class="gf-btn${chFilter==='all'?' on':''}" onclick="ST_DAILY.ch='all';renderDailyKPIs();renderDailyTable();" style="${chFilter==='all'?'background:#111;color:#fff;border-color:#111;':''}">전체</button>
    <button class="gf-btn${chFilter==='online'?' on':''}" onclick="ST_DAILY.ch='online';renderDailyKPIs();renderDailyTable();" style="${chFilter==='online'?'background:#2563EB;color:#fff;border-color:#2563EB;':''}">온라인</button>
    <button class="gf-btn${chFilter==='offline'?' on':''}" onclick="ST_DAILY.ch='offline';renderDailyKPIs();renderDailyTable();" style="${chFilter==='offline'?'background:#7C3AED;color:#fff;border-color:#7C3AED;':''}">오프라인</button>`;

  document.getElementById('dailyLbl').textContent=`${mo}월 일매출 현황 (+VAT, 천원)`;

  const visChs = DAILY_CHS.filter(c=> chFilter==='all'||c.g===(chFilter==='online'?'온라인':'오프라인'));

  // 채널별 월 목표 (천원 단위)
  function chMonthGoal(k){ return Math.round((G26[k]?.[mo-1]||0)/1000); }
  function chDailyNeed(k, cumulK){
    const remain=chMonthGoal(k)-cumulK;
    return (remDays>0&&remain>0)?Math.round(remain/remDays):0;
  }

  const DOW=['일','월','화','수','목','금','토'];

  // 미진행 월 처리 — 데이터 없으면 목표 안내만 표시
  const isFutureMo = yr===String(DAILY_CUR_YEAR) && mo > DAILY_CUR_MONTH;
  const isClosedMo = !isCurYrMo && !isFutureMo;

  // 미진행 월이면 목표 안내만 표시하고 종료
  if(isFutureMo){
    const totalGoal=visChs.reduce((s,c)=>s+chMonthGoal(c.k),0);
    let futureTh=`<thead><tr style="font-size:11px;"><th class="sticky-l" style="min-width:60px;">채널</th><th>월 목표 (+VAT, 천원)</th></tr></thead>`;
    let futureTb=`<tbody>`;
    visChs.forEach(c=>{
      const g=chMonthGoal(c.k);
      futureTb+=`<tr style="font-size:11px;"><td class="sticky-l">${c.n}</td><td style="text-align:right;color:#0369A1;">${g>0?g.toLocaleString()+'천':'—'}</td></tr>`;
    });
    futureTb+=`<tr style="font-weight:700;background:#F0F9FF;"><td class="sticky-l" style="color:#0369A1;">합계</td><td style="text-align:right;color:#0369A1;">${totalGoal.toLocaleString()}천</td></tr>`;
    futureTb+=`<tr><td colspan="2" style="text-align:center;padding:24px;color:#aaa;font-size:12px;">📅 ${mo}월은 아직 진행되지 않은 기간이에요.<br>매일 오전 11시 자동 업데이트됩니다.</td></tr>`;
    futureTb+=`</tbody>`;
    document.getElementById('dailyTblWrap').innerHTML=`<table>${futureTh}${futureTb}</table>`;
    if(window._dailyChartInst){window._dailyChartInst.destroy();window._dailyChartInst=null;}
    document.getElementById('dailyChartWrap').style.display='none';
    document.getElementById('dailyChartToggle').style.display='none';
    return;
  }
  document.getElementById('dailyChartWrap').style.display='block';
  document.getElementById('dailyChartToggle').style.display='';
  const cumul = Object.fromEntries(visChs.map(c=>[c.k,0]));
  if(!isFutureMo){
    for(let d=1;d<=todayDay;d++){
      visChs.forEach(c=>{
        const v=moData[c.k]?.[d-1]??null;
        const disp=v!==null?Math.round(v/1000):null;
        if(disp!==null) cumul[c.k]+=disp;
      });
    }
  }
  const cumulTotal=visChs.reduce((s,c)=>s+cumul[c.k],0);

  // 헤더 + 누계/잔여 고정 행 (thead에 포함)
  let th=`<thead>
  <tr class="dly-hdr-ch" style="font-size:11px;">
    <th class="sticky-l" style="min-width:60px;">일자</th>`;
  visChs.forEach(c=>{
    th+=`<th style="min-width:75px;color:${c.g==='온라인'?'#2563EB':'#7C3AED'};">${c.n}</th>`;
  });
  th+=`<th style="min-width:80px;">합계</th></tr>`;

  // 누계 고정 행
  th+=`<tr class="dly-hdr-cum" style="background:#E8F5E9;font-size:11px;font-weight:700;">
    <th class="sticky-l" style="background:#E8F5E9;color:#1B5E20;text-align:left;font-weight:700;">~${mo}/${todayDay}<br><span style="font-size:9px;font-weight:400;">누계</span></th>`;
  visChs.forEach(c=>{
    th+=`<th style="text-align:right;color:#1B5E20;background:#E8F5E9;">${cumul[c.k].toLocaleString()}</th>`;
  });
  th+=`<th style="text-align:right;color:#1B5E20;background:#E8F5E9;border-bottom:2px solid #A5D6A7;">${cumulTotal.toLocaleString()}</th></tr>`;

  // 잔여 일평균 고정 행 (진행중 월만)
  if(!isClosedMo){
    th+=`<tr class="dly-hdr-need" style="background:#FFF8E1;font-size:11px;">
      <th class="sticky-l" style="background:#FFF8E1;color:#E65100;text-align:left;font-weight:700;">잔여 일평균<br><span style="font-size:9px;font-weight:400;">(${remDays}일)</span></th>`;
    let needTotal=0;
    visChs.forEach(c=>{
      const goal=chMonthGoal(c.k);
      const need=chDailyNeed(c.k,cumul[c.k]);
      needTotal+=need;
      const rate=goal>0?cumul[c.k]/goal:null;
      th+=`<th style="text-align:right;color:#E65100;background:#FFF8E1;font-weight:400;">${need>0?need.toLocaleString()+'천':'✅'}${rate!==null?`<div style="font-size:9px;color:#888;">목 ${goal.toLocaleString()}천 (${fp(rate)})</div>`:''}</th>`;
    });

};

const DIM_LABELS = { col:'컬렉션', yr:'년도', sn:'시즌', cat:'카테고리' };

// ── ISO 주차(YY-WW) → 날짜 범위 ('5/4~5/10')
function isoWkMonday(yy, ww){
  const year = 2000 + parseInt(yy);
  const jan4 = new Date(Date.UTC(year, 0, 4));
  const jan4Day = jan4.getUTCDay() || 7;
  const week1Mon = new Date(jan4);
  week1Mon.setUTCDate(jan4.getUTCDate() - jan4Day + 1);
  const result = new Date(week1Mon);
  result.setUTCDate(week1Mon.getUTCDate() + (ww - 1) * 7);
  return result;
}
function wkDateRange(wkStr){
  if(!wkStr || !wkStr.includes('-')) return '';
  const [yy, ww] = wkStr.split('-');
  const mon = isoWkMonday(yy, parseInt(ww));
  const sun = new Date(mon);
  sun.setUTCDate(mon.getUTCDate() + 6);
  return `${mon.getUTCMonth()+1}/${mon.getUTCDate()}~${sun.getUTCMonth()+1}/${sun.getUTCDate()}`;
}
const COL_COLORS = {
  GC: '#2563EB', GY: '#EC4899',
  '22':'#94A3B8','23':'#64748B','24':'#475569','25':'#9CA3AF','26':'#2563EB',
  CS:'#F59E0B', SP:'#10B981', SS:'#06B6D4', CO:'#8B5CF6', SU:'#EF4444',
};
const CAT_PALETTE = ['#2563EB','#7C3AED','#0891B2','#059669','#D97706','#DC2626','#6366F1','#EC4899','#14B8A6','#F59E0B','#8B5CF6','#06B6D4','#84CC16','#F97316'];
const CH_NAMES = ['자사몰','무신사','29CM','오프라인','ETC'];
const CH_COLORS = ['#2563EB','#7C3AED','#0891B2','#059669','#9CA3AF'];

// 주차별 누계 계산 — 선택 주차까지의 모든 주차 합산
function itQsCum(item, wkIdx){
  // wkIdx = 마지막 주차 인덱스. 그 시점까지 누계.
  // qs는 시트의 누계값(전체). 주차 데이터는 마지막 24주만 있음.
  // 정확한 시점별 누계는 시트의 누계 - (선택주차 이후 주차 합) 으로 보정
  if(wkIdx<0 || wkIdx>=item.w.length-1) return item.qs;
  let afterSelected = 0;
  for(let i=wkIdx+1; i<item.w.length; i++) afterSelected += (item.w[i]||0);
  return Math.max(0, item.qs - afterSelected);
}
function itW1(item, wkIdx){
  const i = wkIdx<0 ? item.w.length-1 : wkIdx;
  return item.w[i] || 0;
}
function itW4(item, wkIdx){
  const end = wkIdx<0 ? item.w.length-1 : wkIdx;
  let s=0;
  for(let i=Math.max(0,end-3); i<=end; i++) s += (item.w[i]||0);
  return s;
}

// 분류 차원 키 추출 (컬렉션/년도/시즌/카테고리)
function itDimKey(item, dim){
  if(dim==='col') return item.col || '—';
  if(dim==='yr')  return item.yr ? `'${item.yr}` : '—';
  if(dim==='sn')  return item.sn  || '—';
  if(dim==='cat') return item.cat || '—';
  return '—';
}
function itDimColor(key, dim){
  const k = dim==='yr' ? key.replace("'",'') : key;
  if(COL_COLORS[k]) return COL_COLORS[k];
  // 카테고리는 팔레트
  return CAT_PALETTE[Math.abs(hash(key))%CAT_PALETTE.length];
}
function hash(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}return h;}

// 필터 적용
function itFiltered(){
  let out = ITEMS_DATA.items;
  if(ST_ITEM.fltCol.size) out = out.filter(it=>ST_ITEM.fltCol.has(it.col));
  if(ST_ITEM.fltYr.size)  out = out.filter(it=>ST_ITEM.fltYr.has(String(it.yr)));
  if(ST_ITEM.fltSn.size)  out = out.filter(it=>ST_ITEM.fltSn.has(it.sn||'—'));
  if(ST_ITEM.fltCat.size) out = out.filter(it=>ST_ITEM.fltCat.has(it.cat));
  if(ST_ITEM.fltReord)    out = out.filter(it=>String(it.reord||'').trim()==='리오더');
  if(ST_ITEM.search){
    const raw = ST_ITEM.search.toLowerCase().trim();
    if(raw){
      // "/" 가 있으면 상품명 / 컬러명 AND 매칭, 없으면 일반 OR 검색
      if(raw.includes('/')){
        const parts = raw.split('/').map(s=>s.trim()).filter(Boolean);
        const namePart = parts[0]||'';
        const colorPart = parts[1]||'';
        out = out.filter(it=>{
          const nameMatch = !namePart || (it.name||'').toLowerCase().includes(namePart) || (it.sty||'').toLowerCase().includes(namePart);
          const colorMatch = !colorPart || (it.clr||'').toLowerCase().includes(colorPart) || (it.clrn||'').toLowerCase().includes(colorPart);
          return nameMatch && colorMatch;
        });
      } else {
        out = out.filter(it=>
          (it.name||'').toLowerCase().includes(raw) ||
          (it.sty||'').toLowerCase().includes(raw) ||
          (it.clr||'').toLowerCase().includes(raw) ||
          (it.clrn||'').toLowerCase().includes(raw) ||
          (it.cat||'').toLowerCase().includes(raw)
        );
      }
    }
  }
  return out;
}

        </div>
        <div>
          <div class="kpi-sub">4주 평균</div>
          <div style="font-size:13px;font-weight:700;color:#555;">${fmN(Math.round(w4/4))} <span style="font-size:10px;color:#999;font-weight:500;">개</span></div>
        </div>
      </div>

      <div class="kpi-lbl">재고 TTL</div>
      <div class="kpi-val">${fmN(stockTtl)} <span style="font-size:11px;color:#999;">개</span></div>

    </div>`;
}

  const trendLabels = trendWeeks.map(w => [w, wkDateRange(w)]);
  const trendData = trendKeys.map(k=>{
    return trendWeeks.map((_, idx)=>{
      const wi = trendStart + idx;
      let s=0;
      items.forEach(it=>{
        if(itDimKey(it,dim)===k) s += (it.w[wi]||0);
      });
      return s;
    });
  });
  const trendTotals = trendWeeks.map((_,idx)=>{
    let s=0; trendData.forEach(arr=>s+=arr[idx]); return s;
  });
  const trendDs = trendKeys.map((k,i)=>({
    label:k, data:trendData[i], backgroundColor:dColors[i], borderColor:dColors[i], borderWidth:0, stack:'s'
  }));

  if(_itTrendInst){_itTrendInst.destroy();_itTrendInst=null;}
  const trendCtx = document.getElementById('itTrend');
  if(trendCtx){
    _itTrendInst = new Chart(trendCtx, {
      type:'bar',
      data:{labels:trendLabels, datasets:trendDs},
      options:{responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{callbacks:{label:c=>{
            const tot = trendTotals[c.dataIndex];
            const pct = tot>0?(c.parsed.y/tot*100).toFixed(1):'0';
            return `${c.dataset.label}: ${c.parsed.y.toLocaleString()} (${pct}%)`;
          }}}
        },
        scales:{
          x:{stacked:true, grid:{display:false}, ticks:{font:{size:9}, callback:function(val,i){
            const lbl = this.getLabelForValue(val);
            return Array.isArray(lbl) ? lbl : [lbl];
          }}},
          y:{stacked:true, grid:{color:'#F0EFEB'}, ticks:{font:{size:10}}}
        }
      },
      plugins:[{
        id:'pctLabels',
        afterDatasetsDraw(chart){
          const {ctx} = chart;
          ctx.save();
          ctx.font='bold 9px sans-serif';
          ctx.textAlign='center';
          ctx.textBaseline='middle';
          chart.data.datasets.forEach((ds, di)=>{
            const meta = chart.getDatasetMeta(di);
            meta.data.forEach((bar, bi)=>{
              const val = ds.data[bi];
              const tot = trendTotals[bi];
              if(tot<=0 || val<=0) return;
              const pct = (val/tot*100);
              if(pct<6) return; // 너무 작으면 생략
              const {x,y} = bar.getCenterPoint();
              ctx.fillStyle='#fff';
              ctx.fillText(pct.toFixed(0)+'%', x, y);
            });
            // 총합 라벨 (마지막 dataset 위에)
            if(di===chart.data.datasets.length-1){
              meta.data.forEach((bar,bi)=>{
                if(trendTotals[bi]<=0) return;
                const {x} = bar.getCenterPoint();
                const top = bar.y;
                ctx.fillStyle='#666';
                ctx.font='bold 10px sans-serif';
                ctx.fillText(trendTotals[bi].toLocaleString(), x, top-8);
              });
            }
          });
          ctx.restore();
        }
      }]
    });
  }
}

// ── 필터 드롭다운 빌드 (다중선택)
function buildItFilters(){
  const items = ITEMS_DATA.items;
  const cols = [...new Set(items.map(i=>i.col).filter(Boolean))].sort();
  const yrs  = [...new Set(items.map(i=>String(i.yr)).filter(Boolean))].sort();
  const sns  = [...new Set(items.map(i=>i.sn).filter(Boolean))].sort();
  const cats = [...new Set(items.map(i=>i.cat).filter(Boolean))].sort();

  const mkDD = (containerId, label, key, vals, st)=>{
    const sel = st.size;
    const lbl = sel ? `${label} (${sel})` : label;
    const opts = vals.map(v=>{
      const on = st.has(v);
      return `<label class="it-dd-opt${on?' on':''}" data-v="${v}"><input type="checkbox" data-f="${key}" data-v="${v}" ${on?'checked':''}> ${v}</label>`;
    }).join('');
    const html = `
      <button type="button" class="it-dd-btn${sel?' active':''}" data-key="${key}">
        <span class="it-dd-lbl">${lbl}</span>
        <span class="it-dd-arr">▾</span>
      </button>
      <div class="it-dd-pop" data-key="${key}">
        ${sel?`<div class="it-dd-actions"><button type="button" class="it-dd-clear" data-f="${key}">선택 해제</button></div>`:''}
        ${opts || '<div class="it-dd-empty">항목 없음</div>'}
      </div>`;
    document.getElementById(containerId).innerHTML = html;
  };

  mkDD('itFltCol', '컬렉션', 'col', cols, ST_ITEM.fltCol);
  mkDD('itFltYr',  '년도',   'yr',  yrs,  ST_ITEM.fltYr);
  mkDD('itFltSn',  '시즌',   'sn',  sns,  ST_ITEM.fltSn);
  mkDD('itFltCat', '카테고리','cat', cats, ST_ITEM.fltCat);

  // 드롭다운 토글
  document.querySelectorAll('.it-dd-btn').forEach(b=>{
    b.addEventListener('click', e=>{
      e.stopPropagation();
      const key = b.dataset.key;
      const isOpen = b.classList.contains('open');
      // 다른 드롭다운 닫기
      document.querySelectorAll('.it-dd-btn.open').forEach(x=>x.classList.remove('open'));
      document.querySelectorAll('.it-dd-pop.open').forEach(x=>x.classList.remove('open'));
      if(!isOpen){
        b.classList.add('open');
        document.querySelector(`.it-dd-pop[data-key="${key}"]`).classList.add('open');
      }
    });
  });

  // 체크박스 변경
  document.querySelectorAll('.it-dd-pop input[type="checkbox"]').forEach(cb=>{
    cb.addEventListener('change', e=>{
      e.stopPropagation();
      const f = cb.dataset.f, v = cb.dataset.v;
      const set = f==='col'?ST_ITEM.fltCol:f==='yr'?ST_ITEM.fltYr:f==='sn'?ST_ITEM.fltSn:ST_ITEM.fltCat;
      if(cb.checked) set.add(v); else set.delete(v);
      ST_ITEM.pgNum = 1;
      renderItem();
    });
  });

  // 선택 해제 버튼
  document.querySelectorAll('.it-dd-clear').forEach(b=>{
    b.addEventListener('click', e=>{
      e.stopPropagation();
      const f = b.dataset.f;
      const set = f==='col'?ST_ITEM.fltCol:f==='yr'?ST_ITEM.fltYr:f==='sn'?ST_ITEM.fltSn:ST_ITEM.fltCat;
      set.clear();
      ST_ITEM.pgNum = 1;
      renderItem();
    });
  });

  // 옵션 라벨 클릭 차단 방지 (체크박스 이벤트 흐름 유지)
  document.querySelectorAll('.it-dd-opt').forEach(o=>{
    o.addEventListener('click', e=>e.stopPropagation());
  });

  // 외부 클릭 시 닫기 (한 번만 등록되도록 처리)
  if(!window.__itDdCloseHandler){
    window.__itDdCloseHandler = ()=>{
      document.querySelectorAll('.it-dd-btn.open').forEach(x=>x.classList.remove('open'));
      document.querySelectorAll('.it-dd-pop.open').forEach(x=>x.classList.remove('open'));
    };
    document.addEventListener('click', window.__itDdCloseHandler);
  }

  const reordBtn = document.getElementById('itFltReord');
  if(reordBtn){
    if(ST_ITEM.fltReord){reordBtn.classList.add('on');reordBtn.style.background='#DC2626';reordBtn.style.color='#fff';}
    else{reordBtn.classList.remove('on');reordBtn.style.background='#FEE2E2';reordBtn.style.color='#991B1B';}
  }
}

// ── 스파크라인 SVG
function sparkSvg(arr){
  if(!arr||!arr.length) return '';
  const last4 = arr.slice(-4);
  const max = Math.max(1, ...last4);
  const w = 60, h = 18, bw = 12, gap = 4;
  let svg = `<svg class="it-spark" viewBox="0 0 ${w} ${h}">`;
  last4.forEach((v,i)=>{
    const bh = Math.max(1, (v/max)*(h-2));
    const x = i*(bw+gap);
    const y = h-bh;
    svg += `<rect class="it-spark-bar${i===3?' last':''}" x="${x}" y="${y}" width="${bw}" height="${bh}" rx="1"/>`;
  });
  svg += '</svg>';
  return svg;
}

// ── 채널 MIX 바
function chMixBar(ch){
  const tot = ch.reduce((s,v)=>s+v,0);
  if(tot<=0) return '<span style="color:#ccc;font-size:9px;">—</span>';
  let bar = '<div class="it-chmix" title="';
  bar += ch.map((v,i)=>`${CH_NAMES[i]} ${tot>0?(v/tot*100).toFixed(0):0}%`).join(' / ');
  bar += '">';
  ch.forEach((v,i)=>{
    const pct = (v/tot*100);
    if(pct>0) bar += `<div class="it-chmix-seg" style="width:${pct}%;background:${CH_COLORS[i]};"></div>`;
  });
  bar += '</div>';
  return bar;
}

// ── TOP 랭킹 표
function renderItemTable(){
  const wkIdx = ST_ITEM.wkIdx<0 ? ITEMS_DATA.weeks.length-1 : ST_ITEM.wkIdx;
  let items = itFiltered();

  // 집계: 스타일 통합이면 같은 스타일코드끼리 합치기
  if(ST_ITEM.agg === 's'){
    const map = {};
    items.forEach(it=>{
      const k = it.sty;
      if(!map[k]){
        map[k] = {
          col:it.col, yr:it.yr, sn:it.sn, cat:it.cat,
          sty:it.sty, clr:'—', name:it.name, clrn:'(전체 컬러)',
          tag:it.tag, mup:it.mup,
          qs:0, ch:[0,0,0,0,0], wh:0, st:0,
          opwk:null, reord:'',
          w: new Array(it.w.length).fill(0),
          _opwks:[], _reords:[],
        };
      }
      const m = map[k];
      m.qs += it.qs;
      it.ch.forEach((v,i)=>m.ch[i]+=v);
      m.wh += it.wh; m.st += it.st;
      it.w.forEach((v,i)=>m.w[i]+=v);
      if(it.opwk!==null) m._opwks.push(it.opwk);
      if(String(it.reord||'').trim()==='리오더') m._reords.push(1);
    });
    items = Object.values(map).map(m=>{
      m.opwk = m._opwks.length ? Math.min(...m._opwks) : null;
      m.reord = m._reords.length ? '리오더' : '';
      delete m._opwks; delete m._reords;
      return m;
    });
  }

  // 정렬
  const sortFns = {
    w1:  (a,b)=>itW1(b,wkIdx)-itW1(a,wkIdx),
    qs:  (a,b)=>itQsCum(b,wkIdx)-itQsCum(a,wkIdx),
    stk: (a,b)=>((b.wh+b.st)-(a.wh+a.st)),
    opwk:(a,b)=>{
      const av=a.opwk===null?Infinity:a.opwk, bv=b.opwk===null?Infinity:b.opwk;
      return av-bv;
    },
    tag: (a,b)=>b.tag-a.tag,
  };
  items.sort(sortFns[ST_ITEM.sort]);

  const total = items.length;
  const pgSize = ST_ITEM.pgSize;
  const totalPages = pgSize > 0 ? Math.max(1, Math.ceil(total / pgSize)) : 1;
  // 현재 페이지가 범위 벗어나면 보정
  if(ST_ITEM.pgNum > totalPages) ST_ITEM.pgNum = totalPages;
  if(ST_ITEM.pgNum < 1) ST_ITEM.pgNum = 1;
  const pgNum = ST_ITEM.pgNum;
  const startIdx = pgSize > 0 ? (pgNum - 1) * pgSize : 0;
  const endIdx = pgSize > 0 ? Math.min(total, startIdx + pgSize) : total;
  const pageItems = items.slice(startIdx, endIdx);

  // subtotal 합계 (필터 적용된 전체 — 페이지 무관)
  let sumQs=0, sumW1=0, sumWh=0, sumSt=0;
  items.forEach(it=>{
    sumQs += itQsCum(it, wkIdx);
    sumW1 += itW1(it, wkIdx);
    sumWh += (it.wh||0);
    sumSt += (it.st||0);
  });

  // 헤더 + subtotal
  let th = `<thead><tr>
    <th style="min-width:30px;">#</th>
    <th style="min-width:130px;">상품명</th>
    <th style="min-width:90px;">분류</th>
    <th>TAG가</th>
    <th>M/UP</th>
    <th>누계판매</th>
    <th>1주판매</th>
    <th style="min-width:65px;">스파크라인(4주)</th>
    <th style="min-width:70px;">채널 MIX</th>
    <th>창고재고</th>
    <th>매장재고</th>
    <th>운영가능주차</th>
    <th>리오더</th>
  </tr>
  <tr class="it-subttl">
    <td colspan="3" class="it-subttl-lbl">∑ 필터 합계 · ${total.toLocaleString()}개 아이템</td>
    <td class="muted">—</td>
    <td class="muted">—</td>
    <td>${sumQs.toLocaleString()}</td>
    <td>${sumW1.toLocaleString()}</td>
    <td class="muted">—</td>
    <td class="muted">—</td>
    <td>${sumWh.toLocaleString()}</td>
    <td>${sumSt.toLocaleString()}</td>
    <td class="muted">—</td>
    <td class="muted">—</td>
  </tr></thead><tbody>`;

  pageItems.forEach((it, idx)=>{
    const w1 = itW1(it, wkIdx);
    const qsCum = itQsCum(it, wkIdx);
    const mup = parseFloat(it.mup)||0;
    const mupCls = mup>=5?'it-mup-bl':mup>=4?'it-mup-hi':mup>=3?'it-mup-md':'it-mup-lo';
    const colTag = `<span class="it-cat-tag it-col-${it.col||'X'}">${it.col||'—'}</span>`;
    const sub = `${it.sty||''}${it.clr?'/'+it.clr:''} · '${it.yr||'?'} ${it.sn||''} · ${it.cat||''}`;
    const isReord = String(it.reord||'').trim()==='리오더';
    const opwk = it.opwk;
    let opCls='it-opwk-ok', opTxt='—';
    if(opwk!==null){
      if(opwk < 0) { opCls='it-opwk-warn'; opTxt='결품'; }
      else if(opwk < 2) { opCls='it-opwk-warn'; opTxt=opwk.toFixed(1)+'주'; }
      else if(opwk < 5) { opCls='it-opwk-mid'; opTxt=opwk.toFixed(1)+'주'; }
      else if(opwk > 100) { opCls='it-opwk-dead'; opTxt='100+주'; }
      else { opCls='it-opwk-ok'; opTxt=opwk.toFixed(1)+'주'; }
    }
    th += `<tr>
      <td style="color:#aaa;font-size:10px;">${startIdx + idx + 1}</td>
      <td><div class="it-name">${it.name||'—'} <span style="color:#888;font-weight:500;font-size:10px;">${it.clrn||''}</span></div><div class="it-name-sub">${sub}</div></td>
      <td>${colTag} <span style="font-size:10px;color:#666;">'${it.yr||'?'} ${it.sn||''} · ${it.cat||''}</span></td>
      <td>${(it.tag||0).toLocaleString()}</td>
      <td class="${mupCls}">${mup.toFixed(2)}</td>
      <td style="font-weight:700;">${qsCum.toLocaleString()}</td>
      <td style="font-weight:700;color:#2563EB;">${w1.toLocaleString()}</td>
      <td>${sparkSvg(it.w)}</td>
      <td>${chMixBar(it.ch)}</td>
      <td class="${(it.wh||0)<=0?'it-stock-warn':'it-stock-ok'}">${(it.wh||0).toLocaleString()}</td>
      <td class="${(it.st||0)<=0?'it-stock-warn':'it-stock-ok'}">${(it.st||0).toLocaleString()}</td>
      <td class="${opCls}" style="font-weight:600;">${opTxt}</td>
      <td>${isReord?'<span class="it-reord-tag it-reord-yes">리오더</span>':'<span class="it-reord-tag it-reord-no">—</span>'}</td>
    </tr>`;
  });
  th += '</tbody>';
  document.getElementById('itTbl').innerHTML = th;

  // 페이저 정보
  const wkRangeTxt = wkDateRange(ITEMS_DATA.weeks[wkIdx]||'');
  const wkInfoTxt = wkRangeTxt ? `${ITEMS_DATA.weeks[wkIdx]||'-'} (${wkRangeTxt})` : (ITEMS_DATA.weeks[wkIdx]||'-');
  const srchTxt = ST_ITEM.search ? `· <span style="background:#FEF3C7;color:#92400E;padding:1px 5px;border-radius:3px;font-weight:700;">검색: "${ST_ITEM.search}"</span> ` : '';
  document.getElementById('itPgInfo').innerHTML =
    `전체 <strong>${total.toLocaleString()}</strong>개 SKU 중 ` +
    `<strong>${total>0?startIdx+1:0}~${endIdx}</strong>번째 표시 ${srchTxt}` +
    `<span style="color:#bbb;">· 기준 주차: <strong style="color:#666;">${wkInfoTxt}</strong> · ${ST_ITEM.agg==='s'?'스타일 통합':'스타일+컬러'}</span>`;

  // 페이지 네비
  const pgSizeSel = document.getElementById('itPgSizeSel');
  if(pgSizeSel) pgSizeSel.value = String(pgSize);
  const pgCur = document.getElementById('itPgCur');
  if(pgCur) pgCur.textContent = pgSize > 0 ? `${pgNum} / ${totalPages}` : '전체';
  const navWrap = document.getElementById('itPgNav');
  if(navWrap) navWrap.style.display = pgSize > 0 ? 'flex' : 'none';
  const setDis = (id, dis)=>{const el=document.getElementById(id); if(el) el.disabled = dis;};
  setDis('itPgFirst', pgNum <= 1);
  setDis('itPgPrev',  pgNum <= 1);
  setDis('itPgNext',  pgNum >= totalPages);
  setDis('itPgLast',  pgNum >= totalPages);
}

// ── 주차 셀렉트 채우기 (내림차순 — 최신 주차가 위로)
function fillItWkSelect(){
  const sel = document.getElementById('itWkSel');
  if(!sel || !ITEMS_DATA.weeks.length) return;
  const cur = ST_ITEM.wkIdx<0 ? ITEMS_DATA.weeks.length-1 : ST_ITEM.wkIdx;
  // 인덱스를 보존한 채로 역순 순회
  const opts = [];
  for(let i = ITEMS_DATA.weeks.length-1; i >= 0; i--){
    const w = ITEMS_DATA.weeks[i];
    const range = wkDateRange(w);
    const isLatest = i === ITEMS_DATA.weeks.length-1;
    const latestTag = isLatest ? ' 🆕' : '';
    opts.push(`<option value="${i}"${i===cur?' selected':''}>${w} 주차 (${range})${latestTag}</option>`);
  }
  sel.innerHTML = opts.join('');
}

  const pgSizeSel = document.getElementById('itPgSizeSel');
  if(pgSizeSel) pgSizeSel.addEventListener('change', e=>{
    ST_ITEM.pgSize = parseInt(e.target.value);
    ST_ITEM.pgNum = 1;
    renderItem();
  });
  // 페이지 네비 화살표
  const navHandler = (delta, goTo)=>{
    return ()=>{
      if(goTo === 'first') ST_ITEM.pgNum = 1;
      else if(goTo === 'last') {
        // last 계산은 renderItemTable에서 보정되므로 큰 수로 설정
        ST_ITEM.pgNum = 99999;
      } else {
        ST_ITEM.pgNum += delta;
      }
      renderItem();
    };
  };
  const elFirst = document.getElementById('itPgFirst');
  const elPrev  = document.getElementById('itPgPrev');
  const elNext  = document.getElementById('itPgNext');
  const elLast  = document.getElementById('itPgLast');
  if(elFirst) elFirst.addEventListener('click', navHandler(0,'first'));
  if(elPrev)  elPrev.addEventListener('click',  navHandler(-1));
  if(elNext)  elNext.addEventListener('click',  navHandler(1));
  if(elLast)  elLast.addEventListener('click',  navHandler(0,'last'));
  // 리오더만
  document.getElementById('itFltReord').addEventListener('click', ()=>{
    ST_ITEM.fltReord = !ST_ITEM.fltReord;
    ST_ITEM.pgNum = 1;
    renderItem();
  });

  // 검색창 — debounce 200ms
  let _searchTimer = null;
  const searchBox = document.getElementById('itSearchBox');
  const searchClear = document.getElementById('itSearchClear');
  if(searchBox){
    searchBox.addEventListener('input', e=>{
      const v = e.target.value;
      if(searchClear) searchClear.style.display = v ? 'inline-flex' : 'none';
      clearTimeout(_searchTimer);
      _searchTimer = setTimeout(()=>{
        ST_ITEM.search = v;
        ST_ITEM.pgNum = 1;
        renderItem();
      }, 200);
    });
  }
  if(searchClear){
    searchClear.addEventListener('click', ()=>{
      searchBox.value = '';
      searchClear.style.display = 'none';
      ST_ITEM.search = '';
      ST_ITEM.pgNum = 1;
      renderItem();
      searchBox.focus();
    });
  }
}

function render(){
  // VAT button
  const vatTag=document.getElementById('vatTag');
  const btnVat=document.getElementById('btnVat');
  if(ST.vat){vatTag.textContent='+VAT';vatTag.className='vtag on';btnVat.classList.remove('excl');}
  else{vatTag.textContent='-VAT';vatTag.className='vtag off';btnVat.classList.add('excl');}

  // DT button
  const dtTag=document.getElementById('dtTag');
  const btnDt=document.getElementById('btnDt');
  if(ST.dt){
    dtTag.textContent='포함';dtTag.className='vtag on';
    btnDt.style.borderColor='#D97706';dtTag.style.background='#10B981';
  } else {
    dtTag.textContent='제외';dtTag.className='vtag off';
    btnDt.style.borderColor='#DC2626';dtTag.style.background='#DC2626';
  }

  // Year & view tabs
  // year tabs removed
  document.querySelectorAll('.vtab').forEach(t=>t.classList.toggle('on',t.dataset.v===ST.view));

  // Group filter buttons — 채널 뷰일 때만 표시
  const grpFilterEl=document.getElementById('grpFilter');
  if(grpFilterEl){
    grpFilterEl.style.display=ST.view==='ch'?'flex':'none';
    document.querySelectorAll('.gf-btn').forEach(b=>b.classList.toggle('on',b.dataset.g===ST.grp));
  }

  // Labels
  const vn=ST.view==='ch'?'채널별 매출':'매장 손익';
  const grpLblMap={all:'',online:' · 온라인',offline:' · 오프라인',ws:' · 도매'};
  document.getElementById('chartLbl').textContent=`2026년 ${vn}${grpLblMap[ST.grp]||''} 현황${!ST.dt?' (DT 제외)':''}`;
  document.getElementById('tblLbl').textContent=`2026년 월별 ${vn}`;

  renderKPIs();
  renderChart();

  // 뷰별 섹션 토글
  const isDaily = ST.view==='daily';
  const isCh = ST.view==='ch';
  const isItem = ST.view==='item';
  const isPL = ST.view==='pl';

  // 글로벌 KPI — 일매출/상품 탭에서는 숨김
  document.getElementById('kpis').style.display = (isDaily||isItem)?'none':'';

  // 메인 차트
  document.getElementById('chartCard').style.display = (isDaily||isItem)?'none':'';

  // YoY 비교 차트 — 채널 뷰에서만 표시
  document.getElementById('yoyChartCard').style.display = isCh?'':'none';

  // 일매출 섹션
  document.getElementById('dailySection').style.display = isDaily?'block':'none';

  // 상품 분석 섹션
  const itemSec = document.getElementById('itemSection');
  if(itemSec) itemSec.style.display = isItem?'block':'none';

  // 주차 셀렉트 — 상품 분석 탭에서만 표시
  const wkSel = document.getElementById('itWkSel');
  if(wkSel) wkSel.style.display = isItem?'inline-block':'none';

  // 나머지 카드 (테이블 등) — 채널/매장손익에서만 표시
  document.querySelectorAll('.card').forEach(c=>{
    if(c.id==='chartCard'||c.id==='yoyChartCard'||c.closest('#dailySection')||c.closest('#apPanel')||c.closest('#itemSection')) return;
    c.style.display=(isDaily||isItem)?'none':'';
  });

  if(isDaily){
    renderDailyKPIs();
    renderDailyTable();
  } else if(isItem){
    renderItem();
  } else if(isCh){
    renderChTable();
    renderYoyChart();
  } else {
    renderPLTable();
  }
  renderAssump();
  renderFn();
}

document.querySelectorAll('.vtab').forEach(t=>t.addEventListener('click',()=>{ST.view=t.dataset.v;save();render();}));

// ── data.json fetch & merge ──────────────────
const DATA_URL='https://raw.githubusercontent.com/glowny-sales/BUSINESS-PLAN/main/data.json';

function mergeData(json){
  try{
    // Daily 반영 — 시뮬 월(CLOSED_CH 이후)만 ST.chOv에 저장
    // WHOLESALE(ws_glb) → ws_dom으로 라우팅 (국내/해외 도매 실적)
    if(json.daily){
      const raw=typeof json.daily==='string'?JSON.parse(json.daily):json.daily;
      const src=raw.daily||raw;
      Object.keys(src).forEach(k=>{
        // WHOLESALE 데이터는 ws_dom에 저장
        const targetKey = k === 'ws_glb' ? 'ws_dom' : k;
        if(!A26[targetKey]) return;
        src[k].forEach((v,i)=>{
          if(v&&v>0&&i>=CLOSED_CH){
            // data.json 값은 항상 덮어씀 (이전 시뮬값 대체)
            ST.chOv[targetKey+'-'+i]=v;
          }
        });
      });
    }
    // dailyDetail 반영
    if(json.dailyDetail){
      const raw=typeof json.dailyDetail==='string'?JSON.parse(json.dailyDetail):json.dailyDetail;
      if(raw.dailyDetail) DAILY_DETAIL=raw.dailyDetail;
      if(raw.currentMonth) DAILY_CUR_MONTH=raw.currentMonth;
      if(raw.currentYear) DAILY_CUR_YEAR=raw.currentYear;
      ST_DAILY.yr=String(DAILY_CUR_YEAR);
      ST_DAILY.month=DAILY_CUR_MONTH;
    }
    // items 반영 — Power Automate에서 보낸 상품 데이터
    if(json.items){
      const raw=typeof json.items==='string'?JSON.parse(json.items):json.items;
      // 빈 배열이면 임베드 미리보기를 유지 (Power Automate 에러 시 fallback)
      if(raw && raw.items && Array.isArray(raw.items) && raw.items.length > 0){
        ITEMS_DATA = raw;
        ITEMS_LAST_UPDATED = json.updated || null;
      } else if(raw && raw.error){
        console.warn('[items] Office Script 에러:', raw.error, raw);
      }
    }
    // 업데이트 날짜 표시
    if(json.updated&&json.updated!=='init'){
      const badge=document.getElementById('updateBadge');
      if(badge) badge.textContent=`· 마지막 업데이트: ${json.updated}`;
    }
  }catch(e){console.warn('data.json merge error:',e);}
}

// ── 임베드 미리보기 데이터 로드 (Power Automate 연동 전에도 동작)
function loadEmbeddedItemData(){
  try{
    const el = document.getElementById('__ITEM_PREVIEW_DATA__');
    if(el && el.textContent){
      const data = JSON.parse(el.textContent);
      if(data.items && Array.isArray(data.items)){
        ITEMS_DATA = data;
        ITEMS_LAST_UPDATED = data.updated || '미리보기';
      }
    }
  }catch(e){console.warn('embedded item data parse error:',e);}
}

function startApp(){
  if(typeof Chart==='undefined'){setTimeout(startApp,80);return;}
  loadEmbeddedItemData();
  bindItemEvents();
  // data.json fetch 시도 — 실패해도 기존 하드코딩 데이터로 정상 작동
  fetch(DATA_URL+'?t='+Date.now())
    .then(r=>r.ok?r.json():null)
    .then(json=>{
      if(json) mergeData(json);
      render();
    })
    .catch(()=>render()); // fetch 실패 시 그냥 렌더
}
startApp();
